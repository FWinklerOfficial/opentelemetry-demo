apiVersion: 1

datasources:
  - name: Tempo
    uid: webstore-tempo
    type: tempo
    url: http://tempo:3200
    editable: true
    isDefault: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: webstore-logs
        spanStartTimeShift: "-20m"
        spanEndTimeShift: "20m"
        filterByTraceID: true
        filterBySpanID: true
        customQuery: true
        query: traceId:"$${__trace.traceId}" AND spanId:"$${__span.spanId}"
      tracesToMetrics:
        datasourceUid: webstore-metrics
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
      serviceMap:
        datasourceUid: webstore-metrics
      nodeGraph:
        enabled: true
      search:
        hide: false
